name: Validate Infrastructure and Scanner

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform -chdir=infra fmt -check -recursive

      - name: Initialize Terraform
        run: terraform -chdir=infra init -backend=false

      - name: Validate Terraform
        run: terraform -chdir=infra validate

  python:
    name: Python Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            scanner/requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            -r scanner/requirements.txt \
            -r requirements-dev.txt

      - name: Compile Python modules
        run: |
          python -m py_compile \
            scanner/inventory.py \
            scanner/governance.py \
            scanner/reporting.py \
            scanner/run_scan.py

      - name: Run unit tests
        run: python -m pytest -v
