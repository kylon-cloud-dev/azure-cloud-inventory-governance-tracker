name: Azure Inventory Governance Scan

on:
  workflow_dispatch:


permissions:
  id-token: write
  contents: read

jobs:
  inventory-scan:
    name: Inventory and Governance Scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            scanner/requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            -r scanner/requirements.txt \
            -r requirements-dev.txt

      - name: Run governance unit tests
        run: python -m pytest -v

      - name: Authenticate to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Azure inventory scan
        working-directory: scanner
        env:
          TARGET_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          REPORT_STORAGE_ACCOUNT_URL: ${{ vars.REPORT_STORAGE_ACCOUNT_URL }}
          REPORT_CONTAINER_NAME: ${{ vars.REPORT_CONTAINER_NAME }}
        run: python run_scan.py | tee ../scan-result.json

      - name: Upload workflow scan result
        uses: actions/upload-artifact@v4
        with:
          name: governance-scan-result
          path: scan-result.json
          retention-days: 30
